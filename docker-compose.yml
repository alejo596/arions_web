version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arions_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword2026
      POSTGRES_DB: arions_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arions_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: "postgresql://postgres:postgrespassword2026@postgres:5432/arions_db?schema=public"
      JWT_SECRET: "arions_super_secret_jwt_key_2026_production_grade"
      CORS_ORIGIN: "http://localhost"
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arions_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads_data:
